<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zona Descuentos | Oferta del Mes</title>

  <!-- Meta básica -->
  <meta name="description" content="Colchón Spring Air King + Garantía Extendida Incluida. Pagá contado o en cuotas con crédito. Oferta por tiempo limitado.">
  <meta name="theme-color" content="#000000">

  <!-- Open Graph (para compartir) -->
  <meta property="og:title" content="Zona Descuentos - Oferta del Mes">
  <meta property="og:description" content="Colchón Spring Air King + Garantía Extendida Incluida">
  <meta property="og:image" content="landing.png">
  <meta property="og:type" content="website">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
    }

    .landing {
      position: relative;
      width: 100%;
      max-width: 1024px;
      margin: 0 auto;
      background: #000;
    }

    .landing img {
      width: 100%;
      display: block;
    }

    /* Zonas clickeables */
    .hotspot {
      position: absolute;
      display: block;
      text-indent: -9999px;
      overflow: hidden;
      z-index: 10;
      border-radius: 10px;
    }

    /* Comprar contado */
    .btn-card {
      left: 7%;
      top: 69.3%;
      width: 38.5%;
      height: 3.4%;
    }

    /* Comprar con crédito */
    .btn-credit {
      left: 52.2%;
      top: 69.3%;
      width: 39%;
      height: 3.4%;
    }

    /* CTA final */
    .btn-final {
      left: 63%;
      top: 94.1%;
      width: 32%;
      height: 3.4%;
    }

    /* Responsive simple */
    @media (max-width: 600px) {
      .btn-card { top: 69.6%; height: 4%; }
      .btn-credit { top: 69.6%; height: 4%; }
      .btn-final { top: 94.3%; height: 4%; }
    }
  </style>
</head>

<body>

  <main class="landing">

    <!-- IMAGEN EXACTA DEL DISEÑO -->
    <img src="landing.png" alt="Zona Descuentos - Colchón Spring Air King con Garantía Extendida">

    <!-- BOTONES -->

    <!-- Comprar contado -->
    <a class="hotspot btn-card"
       href="https://LINK-DE-PAGO.com"
       target="_blank">
       Comprar ahora con tarjeta
    </a>

    <!-- Comprar con crédito -->
    <a class="hotspot btn-credit"
       href="https://wa.me/598XXXXXXXX?text=Hola,%20quiero%20comprar%20el%20colch%C3%B3n%20Spring%20Air%20King%20con%20garant%C3%ADa%20extendida%20en%20cuotas"
       target="_blank">
       Comprar en cuotas con crédito
    </a>

    <!-- CTA final -->
    <a class="hotspot btn-final"
       href="https://wa.me/598XXXXXXXX?text=Hola,%20quiero%20aprovechar%20la%20oferta%20del%20colch%C3%B3n%20Spring%20Air%20King"
       target="_blank">
       No me lo pierdo
    </a>

  </main>

  <!-- (Opcional) Tracking básico -->

  -->

</body>
</html>
